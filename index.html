<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John's Blog</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        header p { opacity: 0.9; font-size: 1.1rem; }
        .posts { display: flex; flex-direction: column; gap: 20px; }
        .post {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .post:hover { transform: translateY(-3px); }
        .post h2 { color: #667eea; margin-bottom: 10px; font-size: 1.4rem; }
        .post .date { color: #999; font-size: 0.9rem; margin-bottom: 10px; }
        .post p { color: #555; }
        .post a { 
            display: inline-block;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .post a:hover { text-decoration: underline; }
        footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            margin-top: 40px;
            padding-top: 20px;
        }
        footer a { color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>John's Blog</h1>
            <p>探索技术，记录生活</p>
        </header>
        
        <div class="posts">
            <article class="post">
                <h2>欢迎来到我的博客</h2>
                <div class="date">2026-03-10</div>
                <p>这是我的第一个 GitHub Pages 博客。我会在这里分享技术文章、项目记录和生活点滴。</p>
                <a href="#">阅读全文 →</a>
            </article>
            
            <article class="post">
                <h2>关于我</h2>
                <div class="date">2026-03-10</div>
                <p>开发者，热爱开源技术，喜欢折腾各种开发板和有趣的项目。</p>
                <a href="#">阅读全文 →</a>
            </article>
        </div>
        
        <footer>
            <p>© 2026 John. Powered by <a href="https://pages.github.com">GitHub Pages</a></p>
        </footer>
    </div>
</body>
</html>
